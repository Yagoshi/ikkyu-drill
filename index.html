<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex"><meta name="theme-color" content="#191712"><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏛️</text></svg>"><title>一級建築士 スキマ演習</title></head><body>
<style>
  :root{
    --bg:#f6f4ee;
    --card:#ffffff;
    --ink:#2a261e;
    --ink2:#5b5443;
    --muted:#94896f;
    --line:#e5ddc9;
    --ok:#1e8a5f;   --ok-bg:#e2f3ea;
    --ng:#c04a35;   --ng-bg:#f9e8e3;
    --c1:#2f6f6a; --c1-bg:#e4efec;
    --c2:#3a6ea5; --c2-bg:#e6eef7;
    --c3:#a05a3c; --c3-bg:#f6ebe2;
    --c4:#5b5866; --c4-bg:#ebeaee;
    --c5:#a67c2e; --c5-bg:#f5eeda;
    --sans:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
    --serif:"Shippori Mincho","Hiragino Mincho ProN","Yu Mincho",serif;
    --mono:ui-monospace,"SF Mono",Consolas,monospace;
    --img-filter:none;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#191712; --card:#232019; --ink:#ece5d4; --ink2:#c3bba6; --muted:#8b8168;
      --line:#3a3527;
      --ok:#4cc08c; --ok-bg:#1d3529;
      --ng:#e07a62; --ng-bg:#3d241d;
      --c1:#5fada5; --c1-bg:#20302d; --c2:#7aa8dd; --c2-bg:#1f2c3a;
      --c3:#d29a77; --c3-bg:#332621; --c4:#a9a6b3; --c4-bg:#2b2a2e; --c5:#d9a94f; --c5-bg:#332b1a;
      --img-filter:invert(0.92) hue-rotate(180deg) contrast(0.95);
    }
  }
  :root[data-theme="dark"]{
    --bg:#191712; --card:#232019; --ink:#ece5d4; --ink2:#c3bba6; --muted:#8b8168;
    --line:#3a3527;
    --ok:#4cc08c; --ok-bg:#1d3529; --ng:#e07a62; --ng-bg:#3d241d;
    --c1:#5fada5; --c1-bg:#20302d; --c2:#7aa8dd; --c2-bg:#1f2c3a;
    --c3:#d29a77; --c3-bg:#332621; --c4:#a9a6b3; --c4-bg:#2b2a2e; --c5:#d9a94f; --c5-bg:#332b1a;
    --img-filter:invert(0.92) hue-rotate(180deg) contrast(0.95);
  }
  :root[data-theme="light"]{
    --bg:#f6f4ee; --card:#ffffff; --ink:#2a261e; --ink2:#5b5443; --muted:#94896f;
    --line:#e5ddc9;
    --ok:#1e8a5f; --ok-bg:#e2f3ea; --ng:#c04a35; --ng-bg:#f9e8e3;
    --c1:#2f6f6a; --c1-bg:#e4efec; --c2:#3a6ea5; --c2-bg:#e6eef7;
    --c3:#a05a3c; --c3-bg:#f6ebe2; --c4:#5b5866; --c4-bg:#ebeaee; --c5:#a67c2e; --c5-bg:#f5eeda;
    --img-filter:none;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--sans);
    font-size:16px; line-height:1.75;
  }
  #app{ max-width:560px; margin:0 auto; padding:0 16px calc(28px + env(safe-area-inset-bottom)); min-height:100dvh; }
  button{ font-family:inherit; font-size:inherit; color:inherit; }
  button:focus-visible{ outline:3px solid var(--c1); outline-offset:2px; }

  /* ---------- theme toggle ---------- */
  .theme-toggle{
    position:absolute; top:0; right:0;
    border:1.5px solid var(--line); background:var(--card); color:var(--ink2);
    border-radius:99px; padding:7px 13px; cursor:pointer; font-size:.78rem;
  }
  .home-head{ text-align:center; padding:60px 0 6px; position:relative; }
  .home-head .theme-toggle{ top:14px; }
  .home-head .kicker{ font-family:var(--mono); font-size:.72rem; letter-spacing:.2em; color:var(--muted); }
  .home-head h1{ font-family:var(--serif); font-size:1.5rem; margin:.4rem 0 .2rem; font-weight:600; }
  .home-head p{ margin:0; color:var(--ink2); font-size:.86rem; }
  .total-bar{ margin:18px 2px 6px; }
  .total-bar .lbl{ display:flex; justify-content:space-between; font-size:.78rem; color:var(--muted); margin-bottom:5px; font-variant-numeric:tabular-nums; }
  .meter{ height:8px; border-radius:99px; background:var(--line); overflow:hidden; }
  .meter > i{ display:block; height:100%; border-radius:99px; background:var(--c1); transition:width .4s ease; }

  .subj-list{ display:flex; flex-direction:column; gap:12px; margin-top:16px; }
  .subj-card{
    width:100%; text-align:left; border:1.5px solid var(--line); background:var(--card);
    border-radius:16px; padding:15px 16px; cursor:pointer; display:block;
    transition:transform .08s ease;
  }
  .subj-card:active{ transform:scale(.985); }
  .subj-card .row1{ display:flex; align-items:center; gap:10px; }
  .subj-badge{
    width:42px; height:42px; border-radius:12px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--serif); font-size:1.25rem; font-weight:700;
    background:var(--sc-bg); color:var(--sc);
  }
  .subj-card .nm{ font-weight:700; font-size:1rem; }
  .subj-card .sub{ font-size:.76rem; color:var(--muted); margin-top:1px; }
  .subj-card .done-chip{
    margin-left:auto; font-size:.72rem; font-variant-numeric:tabular-nums;
    color:var(--sc); background:var(--sc-bg); border-radius:99px; padding:3px 10px; font-weight:700;
    flex:0 0 auto;
  }
  .subj-card .meter{ margin-top:11px; }
  .subj-card .meter > i{ background:var(--sc); }

  .home-foot{ margin-top:22px; display:flex; flex-direction:column; gap:10px; }
  .ghost-btn{
    width:100%; border:1.5px dashed var(--line); background:none; color:var(--ink2);
    border-radius:12px; padding:11px; cursor:pointer; font-size:.86rem;
  }
  .note{ font-size:.72rem; color:var(--muted); text-align:center; line-height:1.6; margin-top:10px; }

  /* ---------- quiz ---------- */
  .quiz-top{
    position:sticky; top:0; z-index:5; background:var(--bg);
    padding:12px 0 10px; display:flex; align-items:center; gap:10px;
  }
  .icon-btn{
    border:1.5px solid var(--line); background:var(--card); border-radius:10px;
    width:38px; height:38px; cursor:pointer; font-size:1rem; flex:0 0 auto; color:var(--ink2);
  }
  .quiz-top .mid{ flex:1; }
  .quiz-top .who{ font-size:.74rem; color:var(--muted); display:flex; justify-content:space-between; margin-bottom:4px; font-variant-numeric:tabular-nums; }
  .streak{ font-weight:700; color:var(--c5); }

  .q-tagline{ display:flex; gap:6px; margin:10px 0 8px; flex-wrap:wrap; }
  .chip{
    font-size:.72rem; font-weight:700; border-radius:99px; padding:3px 11px;
    background:var(--sc-bg); color:var(--sc);
  }
  .chip.gray{ background:var(--line); color:var(--ink2); font-weight:500; }
  .q-text{
    background:var(--card); border:1.5px solid var(--line); border-radius:16px;
    padding:16px; font-size:.98rem; line-height:1.85;
  }
  .q-text img{ display:block; max-width:100%; height:auto; border-radius:8px; filter:var(--img-filter); }
  .q-text .imgnote{ font-size:.72rem; color:var(--muted); margin:8px 0 0; }

  .choices{ display:flex; flex-direction:column; gap:10px; margin-top:14px; }
  .choice{
    width:100%; text-align:left; display:flex; gap:11px; align-items:flex-start;
    background:var(--card); border:1.5px solid var(--line); border-radius:14px;
    padding:13px 14px; cursor:pointer; font-size:.92rem; line-height:1.7;
    transition:border-color .12s ease, background .12s ease;
  }
  .choice .n{
    flex:0 0 auto; width:26px; height:26px; border-radius:8px; margin-top:2px;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:.85rem; background:var(--sc-bg); color:var(--sc);
  }
  .choice.num-only{ justify-content:flex-start; align-items:center; font-weight:700; }
  .choice:not(:disabled):active{ border-color:var(--sc); }
  .choice:disabled{ cursor:default; }
  .choice.correct{ border-color:var(--ok); background:var(--ok-bg); }
  .choice.correct .n{ background:var(--ok); color:#fff; }
  .choice.wrong{ border-color:var(--ng); background:var(--ng-bg); }
  .choice.wrong .n{ background:var(--ng); color:#fff; }
  .choice.dim{ opacity:.45; }

  .verdict{
    margin-top:14px; border-radius:14px; padding:13px 15px; font-weight:700;
    display:flex; align-items:center; gap:8px; font-size:.95rem;
  }
  .verdict.ok{ background:var(--ok-bg); color:var(--ok); }
  .verdict.ng{ background:var(--ng-bg); color:var(--ng); }

  .core{
    margin-top:10px; background:var(--card); border-left:4px solid var(--sc);
    border-radius:0 12px 12px 0; padding:12px 14px; font-size:.9rem;
  }
  .core b{ display:block; font-size:.74rem; color:var(--sc); letter-spacing:.08em; margin-bottom:3px; }
  details.more{ margin-top:10px; }
  details.more summary{
    cursor:pointer; list-style:none; font-size:.83rem; color:var(--ink2);
    border:1.5px solid var(--line); border-radius:10px; padding:9px 13px; background:var(--card);
    display:flex; align-items:center; gap:6px;
  }
  details.more summary::-webkit-details-marker{display:none;}
  details.more summary::before{ content:"▸"; transition:transform .15s; }
  details.more[open] summary::before{ transform:rotate(90deg); }
  details.more .body{ padding:10px 4px 0; font-size:.87rem; color:var(--ink2); }
  details.more .body p{ margin:0 0 .7em; }
  .formula{
    font-family:var(--mono); font-size:.8rem; background:var(--bg);
    border:1px dashed var(--line); border-radius:8px; padding:9px 11px; margin:8px 0;
    white-space:pre-wrap; line-height:1.7; overflow-x:auto;
  }

  .next-btn{
    position:sticky; bottom:14px; margin-top:16px; width:100%;
    border:none; border-radius:14px; padding:15px; font-size:1rem; font-weight:700;
    background:var(--sc); color:#fff; cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.18);
  }
  .next-btn:active{ transform:scale(.985); }

  /* ---------- result ---------- */
  .result-wrap{ text-align:center; padding-top:44px; }
  .result-big{ font-family:var(--serif); font-size:3rem; font-weight:700; line-height:1.1; font-variant-numeric:tabular-nums; }
  .result-big small{ font-size:1.2rem; color:var(--muted); }
  .result-msg{ margin:6px 0 20px; color:var(--ink2); font-size:.95rem; }
  .review{ text-align:left; display:flex; flex-direction:column; gap:8px; margin:18px 0; }
  .review .item{
    background:var(--card); border:1.5px solid var(--line); border-radius:12px; padding:11px 13px;
    font-size:.83rem; display:flex; gap:9px; align-items:flex-start;
  }
  .review .mark{ font-weight:800; flex:0 0 auto; }
  .review .mark.ok{ color:var(--ok); } .review .mark.ng{ color:var(--ng); }
  .stack{ display:flex; flex-direction:column; gap:10px; margin-top:8px; }
  .primary-btn{
    width:100%; border:none; border-radius:14px; padding:14px; font-size:.98rem; font-weight:700;
    background:var(--sc,var(--c1)); color:#fff; cursor:pointer;
  }
  .secondary-btn{
    width:100%; border:1.5px solid var(--line); background:var(--card); border-radius:14px;
    padding:13px; cursor:pointer; font-size:.92rem; color:var(--ink2);
  }

  /* ---------- trends ---------- */
  .trend-wrap{ padding-top:6px; }
  .trend-wrap h2{ font-family:var(--serif); font-size:1.2rem; margin:14px 0 4px; }
  .trend-wrap .lead{ font-size:.83rem; color:var(--muted); margin:0 0 14px; }
  .trend-card{
    background:var(--card); border:1.5px solid var(--line); border-radius:14px;
    padding:14px 15px; margin-bottom:12px;
  }
  .trend-card h3{ margin:0 0 8px; font-size:.92rem; display:flex; align-items:center; gap:7px; }
  .trend-card h3::before{ content:""; width:8px; height:8px; border-radius:2px; background:var(--sc); }
  .trend-card ul{ margin:0; padding-left:1.2em; font-size:.85rem; color:var(--ink2); display:flex; flex-direction:column; gap:6px; }
  .trend-card li b{ color:var(--ink); }

  /* ---------- memo cards ---------- */
  .tabs{ display:flex; gap:8px; margin:12px 0 10px; }
  .tab{
    flex:1; border:1.5px solid var(--line); background:var(--card); color:var(--ink2);
    border-radius:12px; padding:10px; cursor:pointer; font-size:.88rem; font-weight:700;
  }
  .tab.on{ border-color:var(--c1); color:var(--c1); background:var(--c1-bg); }
  .filter-row{ display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:8px; }
  .fchip{
    flex:0 0 auto; border:1.5px solid var(--line); background:var(--card); color:var(--ink2);
    border-radius:99px; padding:5px 13px; cursor:pointer; font-size:.78rem;
  }
  .fchip.on{ border-color:var(--fc,var(--c1)); color:var(--fc,var(--c1)); background:var(--fc-bg,var(--c1-bg)); font-weight:700; }
  .memo-progress{ font-size:.76rem; color:var(--muted); margin:2px 2px 10px; font-variant-numeric:tabular-nums; }
  .mcard{
    background:var(--card); border:1.5px solid var(--line); border-radius:14px;
    padding:13px 14px; margin-bottom:10px;
  }
  .mcard.learned{ opacity:.62; }
  .mcard .front{ display:flex; align-items:flex-start; gap:9px; }
  .mcard .subj-dot{
    flex:0 0 auto; width:10px; height:10px; border-radius:3px; margin-top:8px; background:var(--mc,var(--c1));
  }
  .mcard .front b{ font-size:.94rem; line-height:1.6; }
  .mcard .reveal-btn{
    margin-top:10px; width:100%; border:1.5px dashed var(--line); background:none; color:var(--ink2);
    border-radius:10px; padding:10px; cursor:pointer; font-size:.84rem;
  }
  .mcard .back{
    margin-top:10px; border-top:1px dashed var(--line); padding-top:10px;
    font-size:.88rem; color:var(--ink2);
  }
  .mcard .back .formula{ margin:6px 0; }
  .mcard .actions{ display:flex; gap:8px; margin-top:10px; }
  .learn-btn{
    flex:1; border:1.5px solid var(--line); background:var(--card); color:var(--ink2);
    border-radius:10px; padding:9px; cursor:pointer; font-size:.82rem;
  }
  .learn-btn.on{ border-color:var(--ok); color:var(--ok); background:var(--ok-bg); font-weight:700; }

  /* ---------- 分数表記 ---------- */
  .fr{
    display:inline-flex; flex-direction:column; align-items:center;
    vertical-align:middle; margin:0 3px; line-height:1.35; font-size:.92em;
    font-variant-numeric:normal;
  }
  .fr .nu{ padding:0 5px; }
  .fr .de{ padding:0 5px; border-top:1.3px solid currentColor; }
  .formula .fr{ font-family:var(--serif); }

  /* ---------- welcome / users ---------- */
  .welcome{ text-align:center; padding-top:9vh; }
  .welcome .big-icon{ font-size:3rem; }
  .welcome h1{ font-family:var(--serif); font-size:1.45rem; margin:.6rem 0 .3rem; font-weight:600; }
  .welcome p{ color:var(--ink2); font-size:.88rem; margin:0 0 22px; }
  .nick-input{
    width:100%; border:1.5px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:14px; padding:14px 16px; font-size:1.05rem; text-align:center;
    font-family:inherit; margin-bottom:12px;
  }
  .nick-input:focus{ outline:3px solid var(--c1); outline-offset:1px; }
  .user-list{ display:flex; flex-direction:column; gap:9px; margin-top:26px; }
  .user-list .lbl{ font-size:.76rem; color:var(--muted); }
  .user-pick{
    width:100%; border:1.5px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:13px; padding:13px; cursor:pointer; font-size:.95rem; font-weight:700;
    display:flex; align-items:center; gap:10px; text-align:left;
  }
  .user-pick .prog{ margin-left:auto; font-size:.74rem; color:var(--muted); font-weight:500; font-variant-numeric:tabular-nums; }
  .user-chip{
    position:absolute; top:14px; left:0;
    border:1.5px solid var(--line); background:var(--card); color:var(--ink2);
    border-radius:99px; padding:7px 13px; cursor:pointer; font-size:.78rem; max-width:40%;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  /* ---------- resume card ---------- */
  .resume-card{
    width:100%; text-align:left; margin-top:16px;
    border:1.5px solid var(--c1); background:var(--c1-bg); border-radius:16px;
    padding:14px 16px; cursor:pointer; display:flex; align-items:center; gap:12px;
  }
  .resume-card .icon{ font-size:1.4rem; }
  .resume-card b{ color:var(--c1); }
  .resume-card .sub{ font-size:.78rem; color:var(--ink2); }

  /* ---------- freq badge ---------- */
  .chip.freq{ background:var(--line); color:var(--ink2); font-weight:600; }

  /* ---------- 外部データ読み込み結果 ---------- */
  .ext-status{ font-size:.74rem; text-align:center; color:var(--muted); margin:8px 2px 0; }
  .ext-status.ng{ color:var(--ng); }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; animation:none !important; }
  }
  .pop{ animation:pop .3s ease; }
  @keyframes pop{ 0%{transform:scale(.94);opacity:.4} 100%{transform:scale(1);opacity:1} }
</style>

<div id="app" role="main"></div>

<script>
(function(){
"use strict";

{ subj:"k1", tag:"建築積算（毎年No.19）",
  text:"建築積算に関する次の記述のうち、建築工事積算研究会「建築数量積算基準・同解説」に照らして、<b>最も不適当なもの</b>はどれか。",
  choices:[

    "窓、出入口等の開口部による型枠の欠除は、開口部の内法の見付面積が1箇所当たり1.0m²以下の場合は、原則としてないものとする。",
    "鉄筋の所要数量は、その設計数量に対し4％の割増しを標準とする。",
    "耐火被覆の数量は、材種、材質、形状、寸法、工法、耐火時間及び部位（柱、梁）ごとに区分して計測・計算する。"],
  ans:2,
  core:"型枠の欠除なしは「内法見付面積 0.5m²以下」。1.0m²ではない。",
  detail:"<p>欠除基準は「コンクリート＝体積0.5m³以下」「型枠・仕上げ＝面積0.5m²以下」がセットで頻出。肢3の鉄筋4％割増し（5％と誤らせる出題あり）、肢1・4も基準どおり正しい。</p>" },

{ subj:"k1", tag:"都市計画・まちづくり（毎年2問）",
  text:"都市計画・まちづくりに関する用語の説明として、<b>最も不適当なもの</b>は、次のうちどれか。",
  choices:[
    "TODは、公共交通機関の利用を前提として、過度に自動車へ依存しない持続可能な都市を実現するための開発手法である。",
    "パークアンドライドは、都市中心部の周辺に整備した駐車場に自動車を駐車させ、そこから公共交通機関等を利用して都市中心部へアクセスする仕組みである。",
    "エリアマネジメントは、地域の住民、事業者、地権者等が主体となって、良好な地域環境や地域の価値を維持・向上させるための継続的な取組みである。",
    "BIDは、地区内の不動産所有者や事業者等から徴収した負担金を用いて、行政が主体となり地区の再開発事業を直接実施する制度である。"],
  ans:4,
  core:"BIDもエリアマネジメントも「民間主体」。行政主体としたら誤り。",
  detail:"<p>BIDは地区の負担金を財源に、その地区の関係者自身（民間）が維持管理・活性化を行う仕組み。「行政主導」への言い換えが定番の誤答パターン。TOD・パークアンドライド・LRT・MaaSなど交通系用語も横断して整理しておく。</p>" },

{ subj:"k1", tag:"バリアフリー（ほぼ毎年No.9）",
  text:"「高齢者、障害者等の円滑な移動等に配慮した建築設計標準（国土交通省）」に照らして、<b>最も不適当なもの</b>はどれか。",
  choices:[
    "車椅子使用者用便房のL型手すり及び可動手すりの水平部の高さを、便座の座面から25cmとした。",
    "市庁舎の総合案内所において、ハイカウンターとローカウンターを併設し、視覚障害者誘導用ブロックをハイカウンターに向かって敷設した。",
    "出入口の視覚障害者誘導用ブロックについて、金属製はスリップしやすいため、ノンスリップ加工のものを採用した。",
    "車椅子使用者用便房（大型ベッド付き）とは別に、男女それぞれの便所内にオストメイト用設備を有する便房を分散配置した。"],
  ans:2,
  core:"誘導用ブロックは「ローカウンター」へ導く。ハイカウンターは誤り。",
  detail:"<p>視覚障害者と車椅子使用者の双方が使いやすいのはローカウンター。手すり水平部の高さ「座面＋25cm」は複数年で問われる定番数値。設備の分散配置（肢4）も設計標準の考え方どおり。</p>" },

{ subj:"k1", tag:"日本建築史（主にNo.2）",

  choices:[

  ans:3,
  core:"車路の梁下の高さは 2.3m以上。2.1mでは足りない。",
  detail:"<p>2.1mは「はり下」ではなく駐車スペースの天井高さの目安。車路は車の通行に2.3m以上が必要。数値は「なぜ必要か」（車両寸法・人体寸法・避難流動）とセットで覚えると初見に強い。</p>" },

{ subj:"k1", tag:"マネジメント（毎年No.20）",
  text:"建築のマネジメントに関する次の記述のうち、<b>最も不適当なもの</b>はどれか。",
  choices:[
    "コンセッション方式とは、利用料金を徴収する公共施設について、施設の所有権と運営権をともに民間事業者へ移転する方式である。",
    "PFIにおけるSPC（特別目的会社）は、特定事業の実施を目的に設立され、当該事業以外の投資は行わず、契約期間が終了すれば解散する。",
    "BOT方式とは、民間が資金調達して建設し、一定期間運営した後に、所有権を公共主体に移転する方式である。",
    "デザインビルド方式とは、単一の設計・施工主体が設計及び施工を一括して請け負う方式である。"],
  ans:1,
  core:"コンセッション＝所有権は公共に残し「運営権のみ」移転。",
  detail:"<p>PFI用語は「所有権・運営権・移転タイミング」で整理：BOT＝建設→運営→移転、BTO＝建設→即移転→運営、コンセッション＝所有権を移さず運営権のみ設定。SPC・VFM・CM方式も混同を狙われる。</p>" },

/* ---------- 学科Ⅱ（環境・設備） ---------- */
{ subj:"k2", tag:"空調設備（毎年3問で最頻出）",
  text:"空気調和設備の熱源方式に関する次の記述のうち、<b>最も不適当なもの</b>はどれか。",
  choices:[
    "吸収冷凍機は、同一容量の遠心冷凍機に比べて消費電力が少なく、機内の圧力が大気圧より低いため破裂等の危険性が低い。",
    "井水を熱源水とする水熱源ヒートポンプは、空気熱源ヒートポンプに比べて成績係数（COP）が高くなる。",
    "密閉式冷却塔は、水質汚染を防止できるが、同じ冷却能力の開放式冷却塔に比べて、送風機動力は小さくなる。",
    "水蓄熱槽を利用した熱源システムは、熱源機の容量を低減でき、電力需要の平準化を図ることができる。"],
  ans:3,
  core:"密閉式冷却塔は熱交換器を介す分、送風機動力が「大きく」なる。",
  detail:"<p>密閉式は冷却水を外気に触れさせない＝水質保護に有利だが、通風抵抗が増えるため送風機動力・機体サイズとも大きくなる。水熱源HPのCOP優位、水蓄熱のピークカットは毎年級の頻出知識。</p>" },

{ subj:"k2", tag:"給排水設備（毎年2問）",
  text:"事務所ビルの給水設備に関する次の記述のうち、<b>最も不適当なもの</b>はどれか。",
  choices:[
    "水道直結増圧方式は、水道本管への逆流を防止するため、増圧ポンプの吸込み側に逆流防止器を設置する。",
    "ポンプ直送方式は、受水槽に貯水した後、給水ポンプで直接給水する方式であり、建築物が停電した際にも支障なく給水することができる。",
    "高置水槽方式は、重力を利用して給水する方式であり、他の方式に比べて給水圧力の変動が少ない。",
    "受水槽は、六面点検を可能にするため、周囲・下部・上部に保守点検スペースを確保する。"],
  ans:2,
  core:"ポンプ直送方式は停電したら給水できない。",
  detail:"<p>給水方式は「停電時に出るか」「水質リスク」「圧力変動」の3軸で比較するのが定石。停電時も出るのは高置水槽方式（落差給水）だけ。六面点検は上部100cm・側面下部60cmが目安。</p>" },

{ subj:"k2", tag:"電気設備（毎年2問）",
  text:"電気設備に関する次の記述のうち、<b>最も不適当なもの</b>はどれか。",
  choices:[
    "力率は、皮相電力に対する有効電力の比率であり、進相コンデンサの設置で改善できる。",
    "需要率は、「接続された負荷の最大需要電力」を「負荷設備容量の総和」で除した値である。",
    "交流で600Vを超え7,000V以下は高圧、7,000Vを超えるものは特別高圧に区分される。",
    "かご形三相誘導電動機の始動電流は、全電圧始動方式よりもスターデルタ始動方式のほうが大きくなる。"],
  ans:4,
  core:"スターデルタ始動は始動電流を約1/3に「低減」する方式。",
  detail:"<p>Y結線で始動電圧を1/√3に落とす→始動電流は直入れの約1/3。この大小関係の逆転が最頻出の引っかけ。力率・需要率・不等率の定義、電圧区分（低圧600V以下）も定番。</p>" },

{ subj:"k2", tag:"伝熱・結露（毎年出題）",
  text:"建築物の伝熱に関する次の記述のうち、<b>最も不適当なもの</b>はどれか。",
  choices:[
    "単層壁の熱貫流抵抗は、同一の材料であれば、壁の厚さを2倍にすると、表面熱伝達抵抗を含めた熱貫流抵抗もほぼ2倍になる。",
    "密閉中空層の熱抵抗は、厚さが一定程度を超えると、対流の影響でそれ以上ほとんど変化しなくなる。",
    "熱橋部分の室内側表面温度は、熱橋以外の部分に比べて外気温度に近くなる。",
    "屋外の風速が大きくなると、外壁表面の対流熱伝達率が大きくなり、熱貫流率も大きくなる。"],
  ans:1,
  core:"表面熱伝達抵抗は壁厚と無関係→全体は2倍にならない。",
  detail:"<p>熱貫流抵抗＝表面熱伝達抵抗（一定）＋材料の熱伝導抵抗（厚さ比例）。厚さ2倍でも合計は2倍未満。中空層は約100mmで頭打ち、熱橋は結露リスク箇所、風速↑→熱貫流率↑もセットで。</p>" },

{ subj:"k2", tag:"音響（毎年2問前後）",
  text:"音響及び吸音・遮音に関する次の記述のうち、<b>最も不適当なもの</b>はどれか。",
  choices:[
    "無指向性の点音源からの音圧レベルは、距離が2倍になるごとに約6dB減衰する。",
    "線音源とみなせる道路交通騒音の音圧レベルは、距離が2倍になるごとに約3dB減衰する。",
    "室の平均吸音率を2倍にすると、室内の平均音圧レベルは約6dB減少する。",
    "セイビンの残響式によれば、残響時間は室容積に比例し、等価吸音面積に反比例する。"],
  ans:3,
  core:"吸音率2倍→約3dB減。6dBは点音源の距離減衰と混同させる罠。",
  detail:"<div class='formula'>点音源：距離2倍で −6dB\n線音源：距離2倍で −3dB\n吸音面積2倍：10log₁₀2 ≈ −3dB\n残響時間 T = 0.161{V|A}</div><p>「6dBと3dBの取り違え」が音響分野の定番の誤答パターン。</p>" },

{ subj:"k2", tag:"日照・日射（毎年1問・計算）",
  text:"南中時の太陽高度が30度のときの水平面直達日射量はJ<sub>H</sub>であった。法線面直達日射量J<sub>N</sub>と南向き鉛直面直達日射量J<sub>V</sub>の組合せとして、<b>最も適当なもの</b>はどれか。（sin30°=1/2、cos30°=√3/2）",
  choices:[
    "J<sub>N</sub>＝2J<sub>H</sub>、J<sub>V</sub>＝√3J<sub>H</sub>",
    "J<sub>N</sub>＝2J<sub>H</sub>、J<sub>V</sub>＝J<sub>H</sub>",
    "J<sub>N</sub>＝√3J<sub>H</sub>、J<sub>V</sub>＝J<sub>H</sub>",
    "J<sub>N</sub>＝√3J<sub>H</sub>、J<sub>V</sub>＝2J<sub>H</sub>"],
  ans:1,
  core:"J_H=J_N·sin h、J_V=J_N·cos h の射影関係に当てはめるだけ。",
  detail:"<div class='formula'>J_N = {J_H|sin30°} = J_H ÷ {1|2} = 2J_H\nJ_V = J_N × cos30° = 2J_H × {√3|2} = √3J_H</div><p>過去問は太陽高度60°設定が多い。30°ではsinとcosの値が入れ替わる点に注意。</p>" },

/* ---------- 学科Ⅲ（法規） ---------- */
{ subj:"k3", tag:"建築士法（毎年2〜4問で最多）",
  text:"次の記述のうち、建築士法上、<b>誤っているもの</b>はどれか。",
  choices:[
    "建築士事務所の開設者は、管理建築士が欠けるに至ったときは、遅滞なく、新たな管理建築士を置かなければならない。",
    "登録の有効期間満了後、更新の登録を受けずに報酬を得て設計又は工事監理を業として行った者は、罰則の適用の対象となる。",
    "一級建築士は、建築主から請求があった場合に限り、免許証又は免許証明書を提示すれば足りる。",
    "管理建築士は、受託しようとする業務の量及び難易並びに業務の内容に応じて必要となる期間の設定に関する事項を総括する。"],
  ans:3,
  core:"免許証の提示は「請求時」に限らず、重要事項説明時にも必要。",
  detail:"<p>建築士法第19条の2（請求時の提示）に加え、第24条の7の重要事項説明の際にも管理建築士等は免許証等を提示する義務がある。「〜に限り」の限定表現は法規の定番の誤り作りパターン。</p>" },

{ subj:"k3", tag:"構造規定（毎年3問固定）",
  text:"構造強度に関する次の記述のうち、建築基準法上、<b>誤っているもの</b>はどれか。（高さ4m超の建築物とする）",
  choices:[
    "限界耐力計算では、地震時について、地下部分を除き、地震力による応力度が短期許容応力度を超えないことを確かめなければならない。",
    "鉄骨造で限界耐力計算により安全性が確かめられた場合、圧縮材の有効細長比の規定は適用しないことができる。",
    "鉄筋コンクリート造の耐力壁の厚さは、保有水平耐力計算によって安全性を確かめる場合であっても、原則として12cm以上としなければならない。",
    "高さ25mの鉄骨造で許容応力度等計算による場合、屋外に面する帳壁は風圧に対する構造計算を確かめなくてもよい。"],
  ans:3,
  core:"保有水平耐力計算なら仕様規定（耐力壁12cm等）は適用除外。",
  detail:"<p>計算ルートが上位（保有水平耐力・限界耐力）になるほど仕様規定の適用除外が増える、という構図で覚える。施行令36条〜の「適用の除外」まわりは毎年の頻出ゾーン。</p>" },

{ subj:"k3", tag:"避難施設（毎年2問）",
  text:"避難施設等に関する次の記述のうち、建築基準法上、<b>誤っているもの</b>はどれか。（避難階は地上1階、避難上の安全の検証は行わない）",
  choices:[
    "主要構造部が耐火構造の地上4階建て共同住宅で、各階に居室床面積70m²の住戸が3戸ある場合、2以上の直通階段を設けなくてもよい。",
    "主要構造部が準耐火構造の地上3階建て物販店舗（各階の売場300m²）で、2階及び3階から2以上の直通階段を設けた。",
    "地上6階建て事務所で、6階の居室180m²に避難上有効なバルコニーを設け、屋外直通階段を避難階段の構造とした場合、2以上の直通階段は不要である。",
    "耐火構造の地上15階建て共同住宅で、15階の内装を準不燃材料とした場合、直通階段までの歩行距離を60mとすることができる。"],
  ans:1,
  core:"共同住宅（耐火）は居室200m²超で2以上の直通階段。70×3=210m²でアウト。",
  detail:"<p>令121条：共同住宅は「その階の居室床面積>100m²（耐火・準耐火なら200m²）」で2直通階段。210m²＞200m²なので必要。肢3のバルコニー＋屋外避難階段の緩和（6階以上）、肢4の歩行距離緩和（令120条）は正しい。</p>" },

{ subj:"k3", tag:"防火規定（毎年2問）",
  text:"耐火建築物等に関する次の記述のうち、建築基準法上、<b>誤っているもの</b>はどれか。",
  choices:[
    "防火地域内で、地下1階・地上2階建ての診療所（患者の収容施設あり）を新築する場合は、耐火建築物としなければならない。",
    "準防火地域内で、延べ面積1,200m²・地上3階建ての倉庫を新築する場合は、耐火建築物としなければならない。",
    "準防火地域内で、延べ面積1,600m²・平家建ての事務所を新築する場合は、耐火建築物としなければならない。",
    "防火・準防火地域外で、延べ面積2,500m²・地上3階建ての学校を新築する場合は、耐火建築物としなければならない。"],
  ans:2,
  core:"準防火・3階建て・1,500m²以下→準耐火建築物等でもOK。",
  detail:"<p>準防火地域の規模区分：延べ面積1,500m²超→耐火等、500m²超1,500m²以下かつ3階→準耐火等でも可。防火地域は「階数3以上（地階含む）or 100m²超」で耐火等。学校は法27条系で地域指定と無関係に規制。</p>" },

{ subj:"k3", tag:"確認・手続き（毎年No.3・4）",
  text:"次の記述のうち、建築基準法上、<b>誤っているもの</b>はどれか。",
  choices:[
    "鉄骨造・延べ面積300m²・地上2階建ての事務所の新築で、指定確認検査機関が基準適合を認めたときは、検査済証交付前でも仮使用できる。",
    "地上3階建て物販店舗の避難施設等に関する工事中に建築物を使用する場合、仮使用認定に加え、安全上の措置に関する計画を特定行政庁に届け出なければならない。",
    "延べ面積1,500m²・地上5階建ての事務所の敷地・構造・建築設備は、定期に資格者に調査・検査をさせ特定行政庁に報告しなければならない。",
    "指定確認検査機関から用途変更の確認済証の交付を受けた場合、工事完了時は建築主事に届け出なければならない。"],
  ans:3,
  core:"事務所は定期報告の対象外が原則（特定行政庁の指定用途が中心）。",
  detail:"<p>法12条の定期報告は、劇場・病院・ホテル・共同住宅など不特定多数・避難弱者系の特殊建築物が対象。用途変更は完了検査がなく「届出」で終わる点（肢4）も頻出。</p>" },

{ subj:"k3", tag:"都市計画法（毎年1問）",
  text:"次の記述のうち、都市計画法上、<b>誤っているもの</b>はどれか。",
  choices:[
    "都市計画区域内で、コンクリートプラントの改築の用に供する目的で行う開発行為は、許可を受ける必要はない。",
    "市街化区域内で、社会福祉施設の建築の用に供する800m²の開発行為は、許可を受ける必要はない。",
    "市街化調整区域内の地区整備計画区域内で、地区計画に適合する診療所の開発行為は、所定の要件に該当すれば、許可を受けることなく行うことができる。",
    "都市計画施設の公園区域内で、国が公園施設の建築物を建築する場合、国の機関の長は、あらかじめ都道府県知事等に協議しなければならない。"],

  core:"市街化調整区域の地区計画→「許可を受ければ」開発できる（不要にはならない）。",
  detail:"<p>法34条10号系：地区計画適合は「許可の基準を満たす」だけで、許可自体は必要。市街化区域の開発許可は原則1,000m²以上が対象（肢2の800m²は対象外）。</p>" },

{ subj:"k3", tag:"消防法（毎年1問）",
  text:"次の記述のうち、消防法上、<b>誤っているもの</b>はどれか。（無窓階なし、指定可燃物なし）",
  choices:[
    "準耐火建築物で内装難燃仕上げ・延べ面積1,800m²・地上2階建ての旅館は、原則として屋内消火栓設備を設置しなければならない。",
    "床面積合計7,000m²・平家建ての耐火建築物の美術館で、スプリンクラー設備を設置した場合、その有効範囲は屋外消火栓設備を設置しないことができる。",
    "12,000m²のテレビスタジオ内の600m²の通信機器室で、ハロゲン化物消火設備を設置した場合、自動火災報知設備を設置しないことができる。",
    "地上3階建ての特別支援学校で各階の収容人員20人以上の場合、原則として2階以上の階に避難器具を設置しなければならない。"],

  core:"消火設備を付けても自火報（警報設備）は免除されない。目的が違う。",
  detail:"<p>「消火」と「警報」は代替関係にない、が本問の核心。スプリンクラー設置による他の消火設備の緩和（肢2）はある。旅館は屋内消火栓の設置対象用途で、内装等による面積基準の緩和を考慮しても1,800m²は対象。</p>" },

{ subj:"k3", tag:"バリアフリー法（毎年1問）",
  text:"「高齢者、障害者等の移動等の円滑化の促進に関する法律」上、<b>誤っているもの</b>はどれか。",
  choices:[
    "床面積2,500m²の物品販売業の店舗を新築するときは、建築物移動等円滑化基準に適合させなければならない。",
    "床面積60m²の公衆便所を新築するときは、車椅子使用者が円滑に利用できる構造の便房を1以上設けなければならない。",
    "床面積1,800m²の事務所を新築するときは、移動等円滑化基準に適合させるよう努めなければならない。",
    "既存の特定建築物に車椅子使用者用エレベーターを設置し所管行政庁が防火・避難上支障ないと認めた場合でも、当該エレベーターの構造は耐火構造とはみなされない。"],
  ans:4,
  core:"認定を受けたエレベーターは耐火構造と「みなされる」特例あり。",
  detail:"<p>特別特定建築物（物販店等）は2,000m²以上で適合「義務」、特定建築物（事務所等）は規模によらず「努力義務」— この二段構えを軸に覚える。公衆便所は50m²以上で義務対象。</p>" },

/* ---------- 学科Ⅳ（構造）：本試験過去問（令和7年） ---------- */
{ subj:"k4", tag:"令和7年 No.1｜応力度", img:"s1", numOnly:true, ans:1,
  core:"平均成分 P/A＝2σ、曲げ成分 M/Z＝σ に分解 → e＝D/12",
  detail:"<div class='formula'>台形分布（σ〜3σ）＝ 一様圧縮2σ ＋ 曲げ±σ\n{P|A} = 2σ → P = 2σBD\n{M|Z} = σ、M = P·e、Z = {BD²|6}\n→ e = {D|12}</div><p>全断面圧縮の台形分布は「平均＋曲げ」に分解するのが鉄則。e={D|6}（核半径）は「縁応力度ゼロ」のときで、選択肢3はその引っかけ。</p>" },

{ subj:"k4", tag:"令和7年 No.2｜たわみ", img:"s2", numOnly:true, ans:2,
  core:"張出し梁＝支点回転による剛体変位＋張出し部の片持ちたわみ → 1:2",
  detail:"<div class='formula'>梁A（片持ち）: δA = {Pl³|3EI}\n梁B（張出し）:\n 支点間で生じる回転 θ = {Pl·l|3EI} = {Pl²|3EI}\n 剛体変位 θ·l = {Pl³|3EI}\n ＋張出し部自体の曲げ {Pl³|3EI}\n δB = {2Pl³|3EI} → δA:δB = 1:2</div><p>張出し梁のたわみは「回転×腕の長さ」を忘れないこと。これを落とすと1:1を選んでしまう。</p>" },

{ subj:"k4", tag:"令和7年 No.3｜崩壊荷重", img:"s3", numOnly:true, ans:2,
  core:"節点ヒンジは取り合う部材Mpの小さい方。4隅の合計800 ÷ h4m ＝ 200kN",
  detail:"<div class='formula'>各隅のヒンジモーメント＝取り合う部材の min(Mp)\n左上: min(600,200)=200　右上: min(100,200)=100\n左下: min(600,400)=400　右下: min(100,400)=100\n仮想仕事: Pu·4·θ = (200+100+400+100)·θ\nPu = {800|4} = 200kN</div><p>柱・梁のMpが異なる問題は「弱い方に塑性ヒンジ」が鉄則。すべて柱側と思い込むと600系の数字に引っ張られる。</p>" },

{ subj:"k4", tag:"令和7年 No.4｜ブレース架構", img:"s4", numOnly:true, ans:3,
  core:"柱C:柱D＝3:7 が正しい（3:10 が誤り）。ブレース鉛直成分3Pが柱Dに乗る。",
  detail:"<div class='formula'>1階の層せん断力 = 3P+P = 4P（ピン柱は負担せずブレースEが全部負担）\nN_E = 4P × {5|4} = 5P（肢4は正しい）\n2階ラーメンの転倒: {3P×3m|4m} = 2.25P（柱軸力）\n柱C = 2.25P\n柱D = 2.25P + ブレース鉛直成分3P = 5.25P\nC:D = 2.25:5.25 = 3:7 ≠ 3:10 → 肢3が誤り</div><p>「ピン柱＋ブレース」の層はブレースが水平力を全負担。ブレースの鉛直成分が取り付く柱の軸力に加算される点が急所。</p>" },

{ subj:"k4", tag:"令和7年 No.5｜トラス", img:"s5", numOnly:true, ans:4,
  core:"斜材の軸力＝切断面より上の水平力合計×√2。右トラス2層目は2P→N_D=2√2P。",
  detail:"<div class='formula'>切断法（2層目で水平に切断）:\n左トラス: 上部の水平力 = 3P → N_B = 3√2P ✓\n右トラス: 上部の水平力 = P+P = 2P → N_D = 2√2P\n→ 肢4の「√2P」が誤り\n弦材は M/l で確認: N_A = 3P ✓、N_C = P ✓</div><p>多層トラスは「見たい層で水平に切る」→ 水平釣合いで斜材、モーメント釣合いで弦材。これだけで機械的に解ける。</p>" },

{ subj:"k4", tag:"令和7年 No.6｜座屈", img:"s6", numOnly:true, ans:2,
  core:"座屈長さ：A=2×h、B=0.7×2h=1.4h、C=1×2h=2h → PA=PC＜PB",
  detail:"<div class='formula'>A: 柱脚ピン＋剛梁（水平移動自由）→ 座屈長さ 2h\nB: 水平移動拘束＋剛梁 → 0.7×2h = 1.4h\nC: 柱脚固定＋剛梁（移動自由）→ 1.0×2h = 2h\nPe = {π²EI|le²} より\nPA = PC = {π²EI|4h²} ＜ PB = {π²EI|1.96h²}</div><p>座屈長さ係数（両端固定0.5／固定+ピン0.7／両端ピン1.0／固定+自由2.0）に「水平移動の可否」を掛け合わせて判断する。移動が自由だと座屈長さは大きくなる。</p>" },

{id:"f18",cat:"formula",subj:"k4",front:"四分割法（木造壁量）",back:"<div class='formula'>壁量充足率 = {存在壁量|必要壁量}\n壁率比 = {小さい方の充足率|大きい方の充足率} ≥ 0.5</div>両側の充足率がともに1超なら壁率比の検討は不要。"},
{id:"f19",cat:"formula",subj:"k4",front:"崩壊荷重（仮想仕事法）",back:"<div class='formula'>Pu·δ = Σ(Mp·θ)</div>節点のヒンジは取り合う部材のMpの「小さい方」。ヒンジが生じない部材のMpは計算に使わない。"},
{id:"f20",cat:"formula",subj:"k4",front:"鋼材のヤング係数",back:"<div class='formula'>E = 2.05×10⁵ N/mm²</div>SS400でも高張力鋼でも「一定」。強度が上がってもEは変わらない＝たわみは材質グレードでは改善しない。"},

{id:"t05",cat:"term",subj:"k1",front:"BOT方式／BTO方式",back:"BOT：建設→<b>運営</b>→期間満了後に所有権移転。BTO：建設→<b>即</b>所有権移転→運営。移転のタイミングの違い。"},

   Google Sheetsを「ファイル → 共有 → ウェブに公開 → CSV」で公開し、
   そのURLを下の SHEET_CSV_URL に貼ると、追加の問題・暗記カードを読み込みます。
   URLパラメータ ?data=<CSVのURL> でも指定できます。
   CSVの1行目（ヘッダー）: kind,subj,tag,text,c1,c2,c3,c4,ans,core,detail,front,back
   - kind: quiz（4択問題）/ formula（数式カード）/ term（語句カード）
   - subj: k1〜k5（学科Ⅰ〜Ⅴ）
   - quiz行: tag,text,c1〜c4,ans(1〜4),core,detail を使用
   - formula/term行: front,back を使用                                   */

/* ================= state（ユーザー別プロファイル） ================= */
var PKEY = "ikkyu-profiles-v1";
var profiles = pload();
var store = null; /* 現在のユーザーのデータ */
function pload(){
  try{
    var p = JSON.parse(localStorage.getItem(PKEY));
    if(p && p.users) return p;
  }catch(e){}
  /* 旧バージョン（単一ユーザー）のデータがあれば「ゲスト」として引き継ぐ */
  var old = null;
  try{ old = JSON.parse(localStorage.getItem("ikkyu-quiz-v1")); }catch(e){}
  return { current:null, users: old ? {"ゲスト": old} : {} };
}
function save(){ try{ localStorage.setItem(PKEY, JSON.stringify(profiles)); }catch(e){} }
function setUser(name){
  profiles.current = name;
  profiles.users[name] = profiles.users[name] || {};
  store = profiles.users[name];
  save(); applyTheme();
}
function subjQuestions(sid){ return QUESTIONS.filter(function(q){return q.subj===sid;}); }
function subjColor(sid){ var s=SUBJECTS.find(function(x){return x.id===sid;}); return {c:"var("+s.color+")", bg:"var("+s.colorBg+")"}; }
function answeredCount(sid){
  var r = store[sid] && store[sid].results || {};
  return Object.keys(r).length;
}
function correctCount(sid){
  var r = store[sid] && store[sid].results || {};
  return Object.keys(r).filter(function(k){return r[k];}).length;
}

/* ---------- 分数表記（{分子|分母} → 縦積み分数） ---------- */
function frac(html){
  return (html || "").replace(/\{([^{}|]+)\|([^{}|]+)\}/g,
    '<span class="fr"><span class="nu">$1</span><span class="de">$2</span></span>');
}

/* ---------- CSV loader (Google Sheets等) ---------- */
function parseCSV(text){
  var rows = [], row = [], cur = "", inQ = false;
  for(var i=0;i<text.length;i++){
    var ch = text[i];
    if(inQ){
      if(ch === '"'){ if(text[i+1] === '"'){ cur += '"'; i++; } else inQ = false; }
      else cur += ch;
    }else{
      if(ch === '"') inQ = true;
      else if(ch === ","){ row.push(cur); cur = ""; }
      else if(ch === "\n" || ch === "\r"){
        if(ch === "\r" && text[i+1] === "\n") i++;
        row.push(cur); cur = "";
        if(row.some(function(c){return c !== "";})) rows.push(row);
        row = [];
      }
      else cur += ch;
    }
  }
  row.push(cur);
  if(row.some(function(c){return c !== "";})) rows.push(row);
  return rows;
}
var extStatus = null; /* {ok, msg} 外部データ読み込みの結果（ホームに表示） */
/* 外部データはHTMLを無効化して差し込む（?data=に細工したCSVを渡されてもスクリプトが動かないように）。
   改行と {分子|分母} の分数記法だけ使える */
function extText(s){ return escHtml(s || "").replace(/\n/g,"<br>"); }
function loadExternalData(){
  var url = new URLSearchParams(location.search).get("data") || SHEET_CSV_URL;
  if(!url) return;
  fetch(url).then(function(r){
    if(!r.ok) throw new Error("HTTP " + r.status);
    return r.text();
  }).then(function(text){
    var rows = parseCSV(text);
    if(rows.length < 2){ extStatus = { ok:false, msg:"外部データにデータ行がありません" }; refreshHome(); return; }
    var head = rows[0].map(function(h){ return h.trim().toLowerCase(); });
    var added = 0, skipped = 0;
    rows.slice(1).forEach(function(r, idx){
      var o = {};
      head.forEach(function(h, i){ o[h] = (r[i] || "").trim(); });
      if(!/^k[1-5]$/.test(o.subj)){ skipped++; return; }
      if(o.kind === "quiz"){
        var ansN = +o.ans;
        if(o.text && o.c1 && o.c2 && o.c3 && o.c4 && ansN >= 1 && ansN <= 4){
          QUESTIONS.push({ subj:o.subj, tag:extText(o.tag) || "追加問題", text:extText(o.text),
            choices:[o.c1,o.c2,o.c3,o.c4].map(extText), ans:ansN,
            core:extText(o.core), detail:extText(o.detail) });
          added++;
        }else skipped++;
      }else if((o.kind === "formula" || o.kind === "term") && o.front && o.back){
        CARDS.push({ id:"x"+idx, cat:o.kind, subj:o.subj, front:extText(o.front), back:extText(o.back) });
        added++;
      }else skipped++;
    });
    extStatus = { ok:true, msg:"外部データ "+added+"件を読み込みました"+(skipped ? "（"+skipped+"行はスキップ）" : "") };
    refreshHome();
  }).catch(function(){
    extStatus = { ok:false, msg:"外部データを読み込めませんでした。内蔵データのみで動作しています" };
    refreshHome();
  });
}

function startQuiz(sid){
  var qs = subjQuestions(sid);
  var order = qs.map(function(_,i){return i;});
  session = { sid:sid, order:order, pos:0, correct:0, streak:0, log:[] };
  store._session = null; save();
  renderQuestion();
}
function resumeSession(){
  var sv = store._session;
  if(!sv || !sv.sid || !sv.order){ renderHome(); return; }
  session = { sid:sv.sid, order:sv.order, pos:sv.pos,
    correct:sv.correct, streak:sv.streak, log:sv.log || [] };
  renderQuestion();
}

function renderQuestion(){
  var sid = session.sid;
  var s = SUBJECTS.find(function(x){return x.id===sid;});
  var qs = subjQuestions(sid);
  var q = qs[session.order[session.pos]];
  if(!q){ /* 保存データと問題データが食い違ったとき（外部CSVの変更等）は安全にホームへ */
    session = null; store._session = null; save(); renderHome(); return;
  }
  var col = subjColor(sid);
  var pct = Math.round(session.pos/session.order.length*100);
  var body = '';
  if(q.img){
    body = '<img src="'+IMGS[q.img]+'" alt="過去問の問題図（拡大可）"><p class="imgnote">※ 令和7年本試験の問題（原本画像）。選択肢は画像内の1〜4。</p>';
  }else{
    body = q.text;
  }
  var choicesHtml = '';
  for(var i=1;i<=4;i++){
    var label = q.numOnly ? ('肢 '+i) : q.choices[i-1];
    choicesHtml += '<button class="choice'+(q.numOnly?' num-only':'')+'" data-pick="'+i+'">'
      + '<span class="n">'+i+'</span><span>'+label+'</span></button>';

  + '<div style="--sc:'+col.c+';--sc-bg:'+col.bg+'">'
  + '<div class="quiz-top">'
  + '  <button class="icon-btn" data-go="home" aria-label="ホームへ戻る">←</button>'
  + '  <div class="mid"><div class="who"><span>学科'+s.roman+'（'+s.name+'）</span>'
  + '  <span>'+(session.pos+1)+' / '+session.order.length+'　<span class="streak">'+(session.streak>=2?('🔥'+session.streak+'連続'):'')+'</span></span></div>'
  + '  <div class="meter"><i style="width:'+pct+'%;background:'+col.c+'"></i></div></div>'
  + '</div>'
  + '<div class="pop">'
  + '<div class="q-tagline"><span class="chip">'+q.tag+'</span>'
  + (fq ? '<span class="chip freq">📊 '+fq+'</span>' : '')
  + '</div>'

  + '<div class="choices">'+choicesHtml+'</div>'

  + '</div></div>';

function answer(pick){
  var sid = session.sid;
  var qs = subjQuestions(sid);
  var qi = session.order[session.pos];
  var q = qs[qi];
  var ok = (pick === q.ans);
  if(ok){ session.correct++; session.streak++; } else { session.streak = 0; }
  session.log.push({qi:qi, ok:ok});
  store[sid] = store[sid] || {results:{}};
  store[sid].results[qi] = ok;
  /* 続きから再開用にセッションを保存（最終問なら消去） */
  if(session.pos < session.order.length-1){
    store._session = { sid:session.sid, order:session.order, pos:session.pos+1,
      correct:session.correct, streak:session.streak, log:session.log };
  }else{
    store._session = null;
  }
  save();

  var btns = app.querySelectorAll(".choice");
  btns.forEach(function(b){
    b.disabled = true;
    var n = +b.getAttribute("data-pick");
    if(n === q.ans) b.classList.add("correct");
    else if(n === pick) b.classList.add("wrong");
    else b.classList.add("dim");
  });
  var last = session.pos === session.order.length-1;
  var fb = document.getElementById("feedback");
  fb.innerHTML = ''
  + '<div class="verdict '+(ok?'ok':'ng')+' pop">'+(ok?'✅ 正解！':'❌ 不正解… 正答は「'+q.ans+'」')+'</div>'
  + '<div class="core pop"><b>ここだけ覚える</b>'+frac(q.core)+'</div>'
  + '<details class="more"><summary>詳しい解説</summary><div class="body">'+frac(q.detail)+'</div></details>'
  + '<button class="next-btn" data-go="next">'+(last?'結果を見る':'次の問題 →')+'</button>';
  fb.querySelector(".next-btn").focus({preventScroll:true});
}

/* ================= events ================= */
function findCard(id){ return CARDS.find(function(c){ return c.id === id; }); }
app.addEventListener("click", function(e){
  var t = e.target.closest("[data-pick],[data-go],[data-ctab],[data-csubj],[data-reveal],[data-hide],[data-learn],[data-user]");
  if(!t) return;
  if(t.hasAttribute("data-pick")){ answer(+t.getAttribute("data-pick")); return; }
  if(t.hasAttribute("data-ctab")){ cardsTab = t.getAttribute("data-ctab"); app._cardsScroll = 0; renderCards(); return; }
  if(t.hasAttribute("data-csubj")){ cardsSubj = t.getAttribute("data-csubj"); app._cardsScroll = 0; renderCards(); return; }
  if(t.hasAttribute("data-reveal")){ findCard(t.getAttribute("data-reveal"))._open = true; app._cardsScroll = window.scrollY; renderCards(); return; }
  if(t.hasAttribute("data-hide")){ findCard(t.getAttribute("data-hide"))._open = false; app._cardsScroll = window.scrollY; renderCards(); return; }
  if(t.hasAttribute("data-learn")){ toggleLearned(t.getAttribute("data-learn")); app._cardsScroll = window.scrollY; renderCards(); return; }
  if(t.hasAttribute("data-user")){ setUser(t.getAttribute("data-user")); renderHome(); return; }
  var go = t.getAttribute("data-go");
  if(go==="home") renderHome();
  else if(go==="theme") cycleTheme();
  else if(go==="users") renderWelcome(true);
  else if(go==="register") registerUser();
  else if(go==="resume") resumeSession();
  else if(go==="cards"){ app._cardsScroll = 0; renderCards(); }
  else if(go==="trends") renderTrends();
  else if(go==="quiz") startQuiz(t.getAttribute("data-sid"));
  else if(go==="retry") startQuiz(session.sid);
  else if(go==="retry-wrong"){
    var wrong = session.log.filter(function(l){ return !l.ok; }).map(function(l){ return l.qi; });
    session = { sid:session.sid, order:wrong, pos:0, correct:0, streak:0, log:[] };
    store._session = null; save();
    renderQuestion();
  }
  else if(go==="next"){
    if(session.pos < session.order.length-1){ session.pos++; renderQuestion(); }
    else renderResult();
  }
  else if(go==="reset"){
    if(confirm("「"+profiles.current+"」の進捗（正解履歴・覚えたカード）をリセットしますか？")){
      var keptTheme = store._theme;
      profiles.users[profiles.current] = keptTheme ? { _theme: keptTheme } : {};
      store = profiles.users[profiles.current];
      save(); applyTheme(); renderHome();
    }
  }
});

/* 数字キー1〜4で回答（PC利用時） */
document.addEventListener("keydown", function(e){
  if(!session || e.altKey || e.ctrlKey || e.metaKey) return;
  if(e.target && /^(INPUT|TEXTAREA)$/.test(e.target.tagName)) return;
  if(/^[1-4]$/.test(e.key)){
    var b = app.querySelector('.choice[data-pick="'+e.key+'"]');
    if(b && !b.disabled) b.click();
  }
});

/* ---------- boot ---------- */
if(profiles.current && profiles.users[profiles.current]){
  store = profiles.users[profiles.current];
  applyTheme();
  renderHome();
}else{
  renderWelcome(false);
}
})();
</script>
